<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrieren - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <span class="logo-y logo-text">Y</span><span class="logo-chat logo-text">Chat</span>
      </div>
      <h1 class="auth-title">Konto erstellen</h1>
      <p class="auth-subtitle">Tritt der Community bei</p>
    </div>
    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Dein Name" required>
      </div>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="name@beispiel.de" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label for="passwordConfirm">Passwort bestätigen</label>
        <input type="password" id="passwordConfirm" placeholder="••••••••" required>
      </div>
      <div class="form-error hidden" id="formError"></div>
      <button type="submit" class="btn btn-primary btn-full">Registrieren</button>
    </form>
    <div class="auth-footer">
      Bereits registriert? <a href="login.html">Anmelden</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
function validateRegistration() {
  const name = document.getElementById('name').value
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const passwordConfirm = document.getElementById('passwordConfirm').value
  if (name.length < 2) return 'Name muss mindestens 2 Zeichen haben'
  if (!email.includes('@')) return 'Ungültige E-Mail-Adresse'
  if (password.length < 8) return 'Passwort muss mindestens 8 Zeichen haben'
  if (password !== passwordConfirm) return 'Passwörter stimmen nicht überein'
  return null
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const errorEl = document.getElementById('formError')
  const validationError = validateRegistration()
  if (validationError) {
    errorEl.textContent = validationError
    errorEl.classList.remove('hidden')
    return
  }
  const name = document.getElementById('name').value
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const btn = e.target.querySelector('button[type="submit"]')
  errorEl.classList.add('hidden')
  btn.disabled = true
  try {
    const data = await api('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password }) })
    localStorage.setItem('y-chat-token', data.data.token)
    localStorage.setItem('y-chat-user', JSON.stringify(data.data.user))
    location.href = '.'
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
  btn.disabled = false
})
</script>
</body>
</html>
