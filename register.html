<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrieren - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <span class="logo-y logo-text">Y</span><span class="logo-chat logo-text">Chat</span>
      </div>
      <h1 class="auth-title">Konto erstellen</h1>
      <p class="auth-subtitle">Tritt der Community bei</p>
    </div>
    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Dein Name" required>
      </div>
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="name@beispiel.de" required>
      </div>
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" placeholder="benutzername" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label for="passwordConfirm">Passwort bestätigen</label>
        <input type="password" id="passwordConfirm" placeholder="••••••••" required>
      </div>
      <div class="form-error hidden" id="formError"></div>
      <button type="submit" class="btn btn-primary btn-full">Registrieren</button>
    </form>
    <div class="auth-footer">
      Bereits registriert? <a href="login.html">Anmelden</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const name = document.getElementById('name').value
  const email = document.getElementById('email').value
  const username = document.getElementById('username').value
  const password = document.getElementById('password').value
  const passwordConfirm = document.getElementById('passwordConfirm').value
  const errorEl = document.getElementById('formError')
  const btn = e.target.querySelector('button[type="submit"]')

  if (password !== passwordConfirm) {
    errorEl.textContent = 'Passwörter stimmen nicht überein'
    errorEl.classList.remove('hidden')
    return
  }

  errorEl.classList.add('hidden')
  btn.disabled = true
  try {
    const data = await api('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, username, password }) })
    localStorage.setItem('token', data.data.token)
    localStorage.setItem('user', JSON.stringify(data.data.user))
    location.href = '.'
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
  btn.disabled = false
})
</script>
</body>
</html>
