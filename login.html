<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>Anmelden</h1>
    <div id="errorBox" class="error-box hidden"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input id="email" type="email" class="form-input" placeholder="deine@email.de" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input id="password" type="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Anmelden</button>
    </form>
    <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--text-muted)">
      Noch kein Konto? <a href="/register.html">Registrieren</a>
    </p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const btn = document.getElementById('loginBtn')
  const errorBox = document.getElementById('errorBox')

  errorBox.classList.add('hidden')
  btn.disabled = true
  btn.textContent = 'Wird angemeldet...'

  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    })
    setToken(data.data.token)
    setUser(data.data)
    window.location.href = '/'
  } catch (err) {
    errorBox.textContent = err.message || 'Anmeldung fehlgeschlagen'
    errorBox.classList.remove('hidden')
  }

  btn.disabled = false
  btn.textContent = 'Anmelden'
})
</script>
</body>
</html>
