<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <span class="logo-y logo-text">Y</span><span class="logo-chat logo-text">Chat</span>
      </div>
      <h1 class="auth-title">Willkommen zurück</h1>
      <p class="auth-subtitle">Melde dich an, um weiterzumachen</p>
    </div>
    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="name@beispiel.de" required>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div id="formError" class="hidden" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:14px;border-radius:8px;padding:8px 16px;margin-bottom:16px"></div>
      <button type="submit" class="btn btn-primary btn-full">Anmelden</button>
    </form>
    <div class="auth-footer">
      Noch kein Konto? <a href="register.html">Registrieren</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
if (getUser()) { location.href = '.' }

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const errorEl = document.getElementById('formError')
  const btn = e.target.querySelector('button[type="submit"]')

  errorEl.classList.add('hidden')
  btn.disabled = true
  try {
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) })
    localStorage.setItem('y-chat-token', data.data.token)
    localStorage.setItem('y-chat-user', JSON.stringify(data.data.user))
    location.href = '.'
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
  btn.disabled = false
})
</script>
</body>
</html>
