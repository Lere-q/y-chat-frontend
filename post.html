<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beitrag - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Suchen..." onclick="location.href='/search.html'" readonly>
      </div>
    </div>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div id="postDetail"></div>
    <div id="repliesContainer" style="margin-top:8px"></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
const params = new URLSearchParams(location.search)
const postId = params.get('id')

async function loadPost() {
  if (!postId) { document.getElementById('postDetail').innerHTML = '<div class="empty-state"><p>Keine Beitrags-ID</p></div>'; return }
  try {
    const data = await api(`/posts/${postId}`)
    const post = data.data
    document.title = `Beitrag von ${post.author.name} - Y-Chat`
    document.getElementById('postDetail').innerHTML = createPostCard(post)
    loadReplies()
  } catch { document.getElementById('postDetail').innerHTML = '<div class="empty-state"><p>Beitrag nicht gefunden</p></div>' }
}

async function loadReplies() {
  if (!postId) return
  const container = document.getElementById('repliesContainer')
  try {
    const data = await api(`/posts/${postId}/replies?limit=50`)
    const replies = data.data || []

    let html = `<div class="content-card" style="padding:16px">
      <h3 style="font-size:16px;font-weight:600;color:#fff;margin:0 0 12px">Antworten (${replies.length})</h3>`

    if (replies.length === 0) {
      html += '<p class="text-muted text-sm">Noch keine Antworten</p>'
    } else {
      html += replies.map(r => createPostCard(r)).join('')
    }

    html += `<div style="margin-top:16px;display:flex;gap:12px">
      <div id="replyAvatar"></div>
      <div style="flex:1">
        <textarea id="replyContent" placeholder="Antworten..." rows="2" style="width:100%;padding:12px;border-radius:8px;background:#0F172A;border:1px solid #334155;color:#F1F5F9;font-size:14px;resize:none"></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-primary btn-sm" onclick="submitReply()">Antworten</button>
        </div>
      </div>
    </div></div>`

    container.innerHTML = html
    const user = getUser()
    if (user) document.getElementById('replyAvatar').innerHTML = getAvatarHtml(user, 'sm')
  } catch { container.innerHTML = '' }
}

async function submitReply() {
  const content = document.getElementById('replyContent').value.trim()
  if (!content) return
  try {
    await api(`/posts/${postId}/reply`, { method: 'POST', body: JSON.stringify({ content }) })
    document.getElementById('replyContent').value = ''
    showToast('Antwort gesendet', 'success')
    loadReplies()
  } catch (err) { showToast(err.message, 'error') }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadPost()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
