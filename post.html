<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beitrag - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Suchen..." onclick="location.href='search.html'" readonly>
      </div>
    </div>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="page-header">
      <button class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1>Beitrag</h1>
    </div>
    <div id="postDetail"></div>
    <div id="repliesContainer"></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
const params = new URLSearchParams(location.search)
const postId = params.get('id')
let liked = false, bookmarked = false, reposted = false
let likeCount = 0, repostCount = 0

async function loadPost() {
  if (!postId) { document.getElementById('postDetail').innerHTML = '<div class="empty-state"><p>Keine Beitrags-ID</p></div>'; return }
  try {
    const data = await api('/posts/' + postId)
    const post = data.data
    document.title = 'Beitrag von ' + post.author.name + ' - Y-Chat'
    liked = post.isLiked || false
    bookmarked = post.isBookmarked || false
    reposted = post.isReposted || false
    likeCount = post._count?.likes || 0
    repostCount = post._count?.reposts || 0
    renderPostDetail(post)
    loadReplies()
  } catch { document.getElementById('postDetail').innerHTML = '<div class="empty-state"><p>Beitrag nicht gefunden</p></div>' }
}

function renderPostDetail(post) {
  const el = document.getElementById('postDetail')
  const repliesCount = post._count?.replies || 0
  el.innerHTML = '<div class="post-card" style="border-bottom:1px solid #1e293b">' +
    '<div class="post-card-inner">' +
    '<div class="post-avatar"><a href="profile.html?id=' + post.author.id + '">' + getAvatarHtml(post.author, 'md') + '</a></div>' +
    '<div class="post-body">' +
    '<div class="post-header">' +
    '<a href="profile.html?id=' + post.author.id + '" class="post-author-name">' + escapeHtml(post.author.name) + '</a>' +
    '<a href="community.html?slug=' + post.community.slug + '" class="post-community-name">r/' + escapeHtml(post.community.slug) + '</a>' +
    '<span class="post-separator">·</span>' +
    '<span class="post-time">' + formatDate(post.createdAt) + '</span>' +
    '</div>' +
    '<div class="post-content">' + escapeHtml(post.content) + '</div>' +
    (post.image ? '<div class="post-image-container"><img src="' + escapeHtml(post.image) + '" alt="" onclick="event.stopPropagation();window.open(this.src)" loading="lazy"></div>' : '') +
    '<p class="text-xs text-muted" style="margin-top:8px">' + formatDate(post.createdAt) + '</p>' +
    '<div class="post-actions" style="margin-top:12px;padding-top:12px;border-top:1px solid #1e293b">' +
    '<button class="post-action-btn ' + (liked ? 'liked' : '') + '" onclick="toggleLikeDetail()">' +
    '<svg viewBox="0 0 24 24" fill="' + (liked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>' +
    (likeCount > 0 ? '<span>' + likeCount + '</span>' : '') +
    '</button>' +
    '<button class="post-action-btn repost ' + (reposted ? 'reposted' : '') + '" onclick="toggleRepostDetail()">' +
    '<svg viewBox="0 0 24 24" fill="' + (reposted ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>' +
    (repostCount > 0 ? '<span>' + repostCount + '</span>' : '') +
    '</button>' +
    '<span class="post-action-btn reply" style="cursor:default">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
    (repliesCount > 0 ? '<span>' + repliesCount + '</span>' : '') +
    '</span>' +
    '<button class="post-action-btn bookmark ' + (bookmarked ? 'bookmarked' : '') + '" onclick="toggleBookmarkDetail()" style="margin-left:auto">' +
    '<svg viewBox="0 0 24 24" fill="' + (bookmarked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>' +
    '</button></div></div></div></div>' +
    '<div class="post-editor" style="border-bottom:1px solid #1e293b">' +
    '<div class="post-editor-inner">' +
    '<div id="replyAvatar">' + (getUser() ? getAvatarHtml(getUser(), 'md') : '') + '</div>' +
    '<div class="editor-body">' +
    '<textarea id="replyContent" placeholder="Antwort schreiben..." rows="2" style="width:100%;padding:10px 12px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#f1f5f9;font-size:14px;resize:none;outline:none" onfocus="this.style.borderColor=\'#6366f1\'" onblur="this.style.borderColor=\'#334155\'"></textarea>' +
    '<div class="editor-actions" style="margin-top:8px"><div></div>' +
    '<button class="btn btn-primary btn-sm" onclick="submitReply()">Antworten</button></div></div></div></div>'
}

async function toggleLikeDetail() {
  try {
    const method = liked ? 'DELETE' : 'POST'
    const res = await api('/posts/' + postId + '/like', { method: method })
    liked = !!res.data?.liked
    likeCount = res.data?.count ?? likeCount + (liked ? 1 : -1)
    refreshDetailActions()
  } catch {}
}

async function toggleRepostDetail() {
  try {
    const method = reposted ? 'DELETE' : 'POST'
    const res = await api('/posts/' + postId + '/repost', { method: method })
    reposted = !!res.data?.reposted
    repostCount = res.data?.count ?? repostCount + (reposted ? 1 : -1)
    refreshDetailActions()
  } catch {}
}

async function toggleBookmarkDetail() {
  try {
    const method = bookmarked ? 'DELETE' : 'POST'
    await api('/posts/' + postId + '/bookmark', { method: method })
    bookmarked = !bookmarked
    refreshDetailActions()
  } catch {}
}

function refreshDetailActions() {
  var btns = document.querySelectorAll('#postDetail .post-action-btn')
  if (!btns.length) return
  var likeBtn = btns[0], repostBtn = btns[1], bookmarkBtn = btns[3]
  likeBtn.className = 'post-action-btn' + (liked ? ' liked' : '')
  likeBtn.querySelector('svg').setAttribute('fill', liked ? 'currentColor' : 'none')
  var likeSpan = likeBtn.querySelector('span')
  if (likeCount > 0) { if (!likeSpan) { likeBtn.insertAdjacentHTML('beforeend', '<span>' + likeCount + '</span>') } else { likeSpan.textContent = likeCount } }
  else { if (likeSpan) likeSpan.remove() }
  repostBtn.className = 'post-action-btn repost' + (reposted ? ' reposted' : '')
  repostBtn.querySelector('svg').setAttribute('fill', reposted ? 'currentColor' : 'none')
  var repostSpan = repostBtn.querySelector('span')
  if (repostCount > 0) { if (!repostSpan) { repostBtn.insertAdjacentHTML('beforeend', '<span>' + repostCount + '</span>') } else { repostSpan.textContent = repostCount } }
  else { if (repostSpan) repostSpan.remove() }
  bookmarkBtn.className = 'post-action-btn bookmark' + (bookmarked ? ' bookmarked' : '')
  bookmarkBtn.querySelector('svg').setAttribute('fill', bookmarked ? 'currentColor' : 'none')
}

async function loadReplies() {
  if (!postId) return
  const container = document.getElementById('repliesContainer')
  try {
    const data = await api('/posts/' + postId + '/replies?limit=50')
    const replies = data.data || []
    if (replies.length === 0) { container.innerHTML = ''; return }
    container.innerHTML = replies.map(function(r) {
      return '<div class="post-card" style="padding:10px 16px">' +
        '<div class="post-card-inner" style="gap:8px">' +
        '<div class="post-avatar"><a href="profile.html?id=' + r.author.id + '">' + getAvatarHtml(r.author, 'sm') + '</a></div>' +
        '<div class="post-body">' +
        '<div style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:2px">' +
        '<a href="profile.html?id=' + r.author.id + '" style="font-weight:500;color:#fff;text-decoration:none">' + escapeHtml(r.author.name) + '</a>' +
        '<span style="color:#64748b">·</span>' +
        '<span style="color:#64748b;font-size:12px">' + formatDate(r.createdAt) + '</span></div>' +
        '<div style="color:#e2e8f0;font-size:14px;white-space:pre-wrap">' + escapeHtml(r.content) + '</div></div></div></div>'
    }).join('')
  } catch { container.innerHTML = '' }
}

async function submitReply() {
  const content = document.getElementById('replyContent').value.trim()
  if (!content) return
  try {
    await api('/posts/' + postId + '/replies', { method: 'POST', body: JSON.stringify({ content: content }) })
    document.getElementById('replyContent').value = ''
    showToast('Antwort gesendet', 'success')
    loadReplies()
  } catch (err) { showToast(err.message, 'error') }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadPost()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
