<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beitrag - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="mainContent">
    <div id="loadingState" class="empty-state"><p>Laden...</p></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
const postId = new URLSearchParams(location.search).get('id')

async function loadPost() {
  if (!postId) { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Beitrag nicht gefunden</p></div>'; return }

  try {
    const data = await api(`/posts/${postId}`)
    const post = data.data
    const likedClass = post.isLiked ? 'liked' : ''
    const repostedClass = post.isReposted ? 'reposted' : ''
    const bookmarkedClass = post.isBookmarked ? 'bookmarked' : ''

    let html = `
      <div class="page-header">
        <button onclick="history.back()" class="btn-ghost btn" style="padding:4px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <h1>Beitrag</h1>
      </div>
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:12px">
          <a href="/profile.html?id=${post.author.id}">${getAvatarHtml(post.author, 'md')}</a>
          <div style="flex:1;min-width:0">
            <a href="/profile.html?id=${post.author.id}" class="post-author">${escapeHtml(post.author.name)}</a>
            <a href="/community.html?slug=${post.community.slug}" class="post-community" style="display:block">r/${escapeHtml(post.community.slug)}</a>
            <p style="color:#e2e8f0;font-size:14px;white-space:pre-wrap;margin-top:8px">${escapeHtml(post.content)}</p>
            ${post.image ? `<img src="${escapeHtml(post.image)}" style="max-width:100%;border-radius:12px;margin-top:8px;cursor:pointer" onclick="window.open(this.src)">` : ''}
            <p style="color:var(--text-muted);font-size:12px;margin-top:8px">${formatDate(post.createdAt)}</p>
          </div>
        </div>
        <div style="display:flex;gap:24px;margin-top:12px;padding-top:8px;border-top:1px solid var(--border);color:var(--text-muted)">
          <button class="post-action ${likedClass}" onclick="toggleLike('${post.id}', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg><span>${post._count.likes}</span></button>
          <button class="post-action ${repostedClass}" onclick="toggleRepost('${post.id}', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span>${post._count.reposts}</span></button>
          <span class="post-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>${post._count.replies}</span></span>
          <button class="post-action ${bookmarkedClass}" onclick="toggleBookmark('${post.id}', this)" style="margin-left:auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
        </div>
      </div>
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:8px">
          <textarea id="replyContent" placeholder="Schreibe eine Antwort..." maxlength="280" rows="2" style="flex:1;background:var(--bg-elevated);color:var(--text-base);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:14px;outline:none;resize:none;font-family:inherit"></textarea>
          <button class="btn btn-primary" onclick="submitReply()" style="align-self:flex-end">Antworten</button>
        </div>
      </div>
      <div id="replies">
    `

    if (post.replies && post.replies.length > 0) {
      post.replies.forEach(r => {
        html += `
          <div style="padding:12px 16px;border-bottom:1px solid rgba(51,65,85,0.5);display:flex;gap:12px">
            <a href="/profile.html?id=${r.author.id}">${getAvatarHtml(r.author, 'md')}</a>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;font-size:14px">
                <a href="/profile.html?id=${r.author.id}" style="font-weight:500;color:white;text-decoration:none">${escapeHtml(r.author.name)}</a>
                <span style="color:var(--text-muted)">·</span>
                <span style="color:var(--text-muted);font-size:12px">${formatDate(r.createdAt)}</span>
              </div>
              <p style="color:#e2e8f0;font-size:14px;white-space:pre-wrap;margin-top:4px">${escapeHtml(r.content)}</p>
            </div>
          </div>
        `
      })
    } else {
      html += '<div class="empty-state"><p>Noch keine Antworten</p></div>'
    }

    html += '</div>'
    document.getElementById('mainContent').innerHTML = html
  } catch (err) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Beitrag nicht gefunden</p></div>'
  }
}

async function submitReply() {
  const content = document.getElementById('replyContent').value.trim()
  if (!content) return

  try {
    await api(`/posts/${postId}/replies`, {
      method: 'POST',
      body: JSON.stringify({ content }),
    })
    document.getElementById('replyContent').value = ''
    showToast('Antwort gesendet!')
    loadPost()
  } catch (err) {
    showToast(err.message, 'error')
  }
}

function render() {
  renderSidebar()
  renderRightPanel()
  loadPost()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
