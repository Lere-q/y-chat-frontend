<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beitrag - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Suchen..." onclick="location.href='search.html'" readonly>
      </div>
    </div>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="page-header">
      <button class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 style="font-size:18px;font-weight:700;color:#fff;margin:0">Beitrag</h1>
    </div>
    <div id="postDetail"></div>
    <div id="replyEditor" style="padding:12px 16px;border-bottom:1px solid rgba(30,41,59,0.5)">
      <div style="display:flex;gap:12px">
        <div id="replyAvatar"></div>
        <div style="flex:1">
          <textarea id="replyContent" placeholder="Antworten..." rows="2" style="width:100%;padding:10px 12px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#f1f5f9;font-size:14px;resize:none;outline:none" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#334155'"></textarea>
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button class="btn btn-primary btn-sm" onclick="submitReply()">Antworten</button>
          </div>
        </div>
      </div>
    </div>
    <div id="repliesContainer"></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
const params = new URLSearchParams(location.search)
const postId = params.get('id')

async function loadPost() {
  if (!postId) { document.getElementById('postDetail').innerHTML = '<div class="empty-state"><p>Keine Beitrags-ID</p></div>'; return }
  try {
    const data = await api(`/posts/${postId}`)
    const post = data.data
    document.title = `Beitrag von ${post.author.name} - Y-Chat`
    document.getElementById('postDetail').innerHTML = createPostCard(post)
    loadReplies()
    const user = getUser()
    if (user) document.getElementById('replyAvatar').innerHTML = getAvatarHtml(user, 'sm')
  } catch { document.getElementById('postDetail').innerHTML = '<div class="empty-state"><p>Beitrag nicht gefunden</p></div>' }
}

async function loadReplies() {
  if (!postId) return
  const container = document.getElementById('repliesContainer')
  try {
    const data = await api(`/posts/${postId}/replies?limit=50`)
    const replies = data.data || []
    if (replies.length === 0) { container.innerHTML = ''; return }
    container.innerHTML = replies.map(r => {
      return `
        <div class="post-card" style="padding:10px 16px">
          <div class="post-card-inner" style="gap:8px">
            <div class="post-avatar">
              <a href="profile.html?id=${r.author.id}">${getAvatarHtml(r.author, 'sm')}</a>
            </div>
            <div class="post-body">
              <div style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:2px">
                <a href="profile.html?id=${r.author.id}" style="font-weight:500;color:#fff;text-decoration:none">${escapeHtml(r.author.name)}</a>
                <span style="color:#64748b">·</span>
                <span style="color:#64748b;font-size:12px">${formatDate(r.createdAt)}</span>
              </div>
              <div style="color:#e2e8f0;font-size:14px;white-space:pre-wrap">${escapeHtml(r.content)}</div>
            </div>
          </div>
        </div>
      `
    }).join('')
  } catch { container.innerHTML = '' }
}

async function submitReply() {
  const content = document.getElementById('replyContent').value.trim()
  if (!content) return
  try {
    await api(`/posts/${postId}/replies`, { method: 'POST', body: JSON.stringify({ content }) })
    document.getElementById('replyContent').value = ''
    showToast('Antwort gesendet', 'success')
    loadReplies()
  } catch (err) { showToast(err.message, 'error') }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadPost()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
