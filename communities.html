<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communities - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Communities</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="content-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        <h2 style="font-size:18px;font-weight:700;color:#fff">Alle Communities</h2>
        <a href="/community-new.html" class="btn btn-primary btn-sm">Erstellen</a>
      </div>
      <div id="communityList"></div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
async function loadCommunities() {
  const el = document.getElementById('communityList')
  el.innerHTML = '<p class="text-muted text-sm">Lädt...</p>'
  try {
    const data = await api('/communities?limit=50')
    const items = data.data || []
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>Noch keine Communities</p></div>'
      return
    }
    el.innerHTML = items.map(c => `
      <a href="/community.html?slug=${c.slug}" class="community-item" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;text-decoration:none;color:inherit;transition:background 0.15s">
        <span class="community-icon-small" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:16px;font-weight:700;flex-shrink:0">${c.name[0]}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;color:#fff">r/${escapeHtml(c.slug)}</div>
          <div style="font-size:12px;color:#64748b">${c._count.members || 0} Mitglieder · ${c._count.posts || 0} Beiträge</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    `).join('')
  } catch {
    el.innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadCommunities()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
