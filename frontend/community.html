<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="mainContent">
    <div id="loadingState" class="empty-state"><p>Laden...</p></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let slug = new URLSearchParams(location.search).get('slug')

async function loadCommunity() {
  requireAuth()
  if (!slug) { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Community nicht gefunden</p></div>'; return }

  try {
    const [commData, postsData] = await Promise.all([
      api(`/communities/${slug}`),
      api(`/posts?communitySlug=${slug}&limit=20`),
    ])

    const community = commData.data
    const posts = postsData.data || []

    const iconColors = ['#6366f1', '#ec4899', '#14b8a6', '#f59e0b', '#8b5cf6', '#ef4444', '#22c55e', '#3b82f6']
    const color = iconColors[community.name.length % iconColors.length]

    let html = `
      <div style="padding:24px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:16px;align-items:flex-start">
          <div class="community-icon" style="background:${color};width:64px;height:64px;font-size:28px">${community.name[0]}</div>
          <div style="flex:1">
            <h2 style="font-size:20px">${escapeHtml(community.name)}</h2>
            <p style="font-size:13px;color:var(--text-muted);margin-top:4px">${escapeHtml(community.description || 'Keine Beschreibung')}</p>
            <div class="community-stats" style="margin-top:8px">
              <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> ${community._count.members} Mitglieder</span>
              <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${community._count.posts} Beiträge</span>
            </div>
            <button class="btn ${community.isJoined ? 'btn-ghost' : 'btn-primary'}" style="margin-top:12px" onclick="toggleJoin()" id="joinBtn">${community.isJoined ? 'Beitreten' : 'Beitreten'}</button>
          </div>
        </div>
      </div>
    `

    if (community.isJoined) {
      html += `
        <div class="post-editor">
          <textarea id="postContent" placeholder="Schreibe einen Beitrag..." maxlength="280" rows="3"></textarea>
          <div class="editor-actions">
            <button class="btn btn-primary" onclick="submitCommunityPost()">Posten</button>
          </div>
        </div>
      `
    }

    if (posts.length === 0) {
      html += '<div class="empty-state"><p>Noch keine Beiträge</p></div>'
    } else {
      html += '<div>' + posts.map(p => createPostCard(p)).join('') + '</div>'
    }

    document.getElementById('mainContent').innerHTML = html
  } catch (err) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Community nicht gefunden</p></div>'
  }
}

async function submitCommunityPost() {
  const content = document.getElementById('postContent').value.trim()
  if (!content) return

  try {
    const commData = await api(`/communities/${slug}`)
    const communityId = commData.data.id
    await api('/posts', { method: 'POST', body: JSON.stringify({ content, communityId }) })
    document.getElementById('postContent').value = ''
    showToast('Beitrag erstellt!')
    loadCommunity()
  } catch (err) {
    showToast(err.message, 'error')
  }
}

async function toggleJoin() {
  const btn = document.getElementById('joinBtn')
  try {
    if (btn.textContent === 'Beitreten') {
      await api(`/communities/${slug}/join`, { method: 'POST' })
    } else {
      await api(`/communities/${slug}/join`, { method: 'DELETE' })
    }
    loadCommunity()
  } catch (err) {
    showToast(err.message, 'error')
  }
}

function render() {
  renderSidebar()
  renderRightPanel()
  loadCommunity()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
