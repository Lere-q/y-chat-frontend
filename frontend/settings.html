<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstellungen - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="max-width:600px">
    <div class="page-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary)"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <h1>Einstellungen</h1>
    </div>
    <div style="padding:16px">
      <div class="settings-section">
        <h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Profil</h2>
        <div id="profileInfo" style="display:flex;align-items:center;gap:12px;margin-bottom:16px"></div>
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" class="form-input" maxlength="50">
        </div>
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" class="form-input" maxlength="160" rows="3"></textarea>
          <div style="text-align:right;font-size:12px;color:var(--text-muted)" id="bioCount">0/160</div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()" id="saveBtn">Speichern</button>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:24px;margin-top:24px">
        <button class="btn btn-danger" onclick="logout()">Abmelden</button>
      </div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let userData = null

async function loadSettings() {
  requireAuth()
  const user = getUser()
  if (!user) { window.location.href = '/login.html'; return }

  try {
    const data = await api(`/users/${user.id}`)
    userData = data.data
    document.getElementById('name').value = userData.name || ''
    document.getElementById('bio').value = userData.bio || ''
    document.getElementById('bioCount').textContent = `${(userData.bio || '').length}/160`
    document.getElementById('profileInfo').innerHTML = `
      ${getAvatarHtml(userData, 'lg')}
      <div>
        <div style="font-weight:500">${escapeHtml(userData.name)}</div>
        <div style="font-size:13px;color:var(--text-muted)">${userData.email}</div>
      </div>
    `
  } catch {
    showToast('Fehler beim Laden', 'error')
  }
}

document.getElementById('bio').addEventListener('input', function() {
  document.getElementById('bioCount').textContent = `${this.value.length}/160`
})

async function saveSettings() {
  const name = document.getElementById('name').value.trim()
  const bio = document.getElementById('bio').value.trim()
  if (name.length < 2) { showToast('Name muss mindestens 2 Zeichen haben', 'error'); return }

  const btn = document.getElementById('saveBtn')
  btn.disabled = true
  btn.textContent = 'Speichert...'

  try {
    const user = getUser()
    await api(`/users/${user.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ name, bio: bio || undefined }),
    })
    showToast('Einstellungen gespeichert!')
  } catch (err) {
    showToast(err.message, 'error')
  }

  btn.disabled = false
  btn.textContent = 'Speichern'
}

function render() {
  renderSidebar()
  renderRightPanel()
  loadSettings()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
