<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesezeichen - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary)"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <h1>Lesezeichen</h1>
    </div>
    <div id="bookmarksFeed"></div>
    <div id="sentinel" style="height:4px"></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let cursor = null
let hasMore = true
let loading = false
let observer = null

async function loadBookmarks() {
  if (loading || !hasMore) return
  loading = true

  const feedEl = document.getElementById('bookmarksFeed')
  feedEl.insertAdjacentHTML('beforeend', createSkeletonPost() + createSkeletonPost())

  try {
    const params = new URLSearchParams({ limit: '20' })
    if (cursor) params.set('cursor', cursor)
    const data = await api(`/bookmarks?${params}`)

    if (!cursor) feedEl.innerHTML = ''

    if (data.data.length === 0 && !cursor) {
      feedEl.innerHTML = '<div class="empty-state"><p>Keine Lesezeichen</p></div>'
    } else {
      data.data.forEach(post => feedEl.insertAdjacentHTML('beforeend', createPostCard(post)))
    }

    cursor = data.nextCursor
    hasMore = !!data.nextCursor
  } catch {
    if (!cursor) feedEl.innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
  loading = false
}

function setupInfiniteScroll() {
  observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && hasMore && !loading) loadBookmarks()
  }, { threshold: 0.1 })
  const sentinel = document.getElementById('sentinel')
  if (sentinel) observer.observe(sentinel)
}

function render() {
  requireAuth()
  renderSidebar()
  renderRightPanel()
  loadBookmarks()
  setupInfiniteScroll()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
