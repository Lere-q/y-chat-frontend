<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Bookmarks</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div id="bookmarksContent"></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
async function loadBookmarks() {
  const el = document.getElementById('bookmarksContent')
  if (!getUser()) { el.innerHTML = '<div class="empty-state"><p>Bitte anmelden</p></div>'; return }
  try {
    const data = await api('/bookmarks?limit=50')
    const posts = (data.data || []).map(b => b.post || b)
    if (posts.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>Keine Lesezeichen</p></div>'
      return
    }
    el.innerHTML = posts.map(p => createPostCard(p)).join('')
  } catch {
    el.innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadBookmarks()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
