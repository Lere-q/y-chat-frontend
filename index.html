<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Suchen..." onclick="location.href='search.html'" readonly>
      </div>
    </div>
    <div id="topBarAvatar"></div>
  </header>

  <main class="main-content">
    <div class="feed-tabs">
      <button class="feed-tab active" data-feed="foryou" onclick="switchFeed('foryou')">
        Für dich
        <div class="feed-tab-indicator"></div>
      </button>
      <button class="feed-tab" data-feed="latest" onclick="switchFeed('latest')">Neueste</button>
    </div>

    <div class="post-editor" id="postEditor">
      <div class="post-editor-inner">
        <div id="editorAvatar"></div>
        <div class="editor-body">
          <textarea id="postContent" placeholder="Was gibt's Neues?" rows="1" oninput="autoResize(this)"></textarea>
          <div id="imagePreview" class="image-preview hidden"></div>
          <div class="editor-actions">
            <div class="editor-tools">
              <select class="community-select" id="communitySelect"></select>
              <label class="image-upload-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
              </label>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="char-count" id="charCount">280</span>
              <button class="btn btn-primary btn-sm" onclick="submitPost()" id="postBtn">Posten</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="feed"></div>
    <div id="sentinel" style="height:4px"></div>
  </main>

  <aside class="right-panel" id="rightPanel"></aside>
</div>

<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let feed = 'foryou'
let cursor = null
let hasMore = true
let loading = false
let observer = null
let selectedCommunity = ''
let postImage = null

function switchFeed(tab) {
  feed = tab
  cursor = null
  hasMore = true
  document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.feed-tab').forEach(t => t.querySelector('.feed-tab-indicator')?.remove())
  document.querySelector(`.feed-tab[data-feed="${tab}"]`).classList.add('active')
  const ind = document.createElement('div')
  ind.className = 'feed-tab-indicator'
  document.querySelector(`.feed-tab[data-feed="${tab}"]`).appendChild(ind)
  document.getElementById('feed').innerHTML = ''
  loadPosts()
}

async function loadPosts() {
  if (loading || !hasMore) return
  loading = true

  const feedEl = document.getElementById('feed')
  for (let i = 0; i < 3; i++) {
    feedEl.insertAdjacentHTML('beforeend',
      '<div class="post-card"><div class="post-card-inner"><div class="post-avatar"><div class="skeleton" style="width:36px;height:36px;border-radius:50%"></div></div><div class="post-body"><div class="skeleton skeleton-text" style="width:120px"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:75%"></div></div></div></div>')
  }

  try {
    const params = new URLSearchParams({ feed, limit: '20' })
    if (cursor) params.set('cursor', cursor)
    const data = await api(`/posts?${params}`)
    feedEl.innerHTML = ''

    if (data.data.length === 0) {
      feedEl.innerHTML = '<div class="empty-state"><p>' +
        (feed === 'foryou' ? 'Tritt Communities bei, um Beiträge zu sehen' : 'Noch keine Beiträge') +
        '</p></div>'
    } else {
      data.data.forEach(post => feedEl.insertAdjacentHTML('beforeend', createPostCard(post)))
    }
    cursor = data.nextCursor
    hasMore = !!data.nextCursor
  } catch {
    document.getElementById('feed').innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
  loading = false
}

function setupInfiniteScroll() {
  observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && hasMore && !loading) loadPosts()
  }, { threshold: 0.1 })
  const sentinel = document.getElementById('sentinel')
  if (sentinel) observer.observe(sentinel)
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = el.scrollHeight + 'px'
  const len = el.value.length
  const counter = document.getElementById('charCount')
  counter.textContent = 280 - len
  counter.className = 'char-count'
  if (len > 260) counter.classList.add('near-limit')
  if (len > 280) counter.classList.add('over-limit')
}

async function handleImageUpload(input) {
  const file = input.files?.[0]
  if (!file) return
  if (file.size > 5 * 1024 * 1024) { showToast('Bild zu groß (max 5 MB)', 'error'); return }

  try {
    const formData = new FormData()
    formData.append('file', file)
    const data = await api('/upload', { method: 'POST', body: formData })
    postImage = data.data.url
    const preview = document.getElementById('imagePreview')
    preview.innerHTML = `<img src="${postImage}" alt=""><button onclick="removeImage()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
    preview.classList.remove('hidden')
  } catch { showToast('Upload fehlgeschlagen', 'error') }
}

function removeImage() {
  postImage = null
  document.getElementById('imagePreview').classList.add('hidden')
}

async function submitPost() {
  const content = document.getElementById('postContent').value.trim()
  if (!content || !selectedCommunity) return
  if (content.length > 280) { showToast('Text zu lang', 'error'); return }

  const btn = document.getElementById('postBtn')
  btn.disabled = true

  try {
    const body = { content, communityId: selectedCommunity }
    if (postImage) body.image = postImage
    await api('/posts', { method: 'POST', body: JSON.stringify(body) })
    document.getElementById('postContent').value = ''
    document.getElementById('charCount').textContent = '280'
    removeImage()
    showToast('Beitrag erstellt', 'success')
    cursor = null; hasMore = true; document.getElementById('feed').innerHTML = ''; loadPosts()
  } catch (err) { showToast(err.message, 'error') }
  btn.disabled = false
}

async function loadJoinedCommunities() {
  try {
    const data = await api('/communities?joined=true&limit=50')
    const list = data.data || []
    const sel = document.getElementById('communitySelect')
    sel.innerHTML = list.map(c => `<option value="${c.id}">r/${c.slug}</option>`).join('')
    if (list.length > 0) { selectedCommunity = list[0].id }
  } catch {}
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadJoinedCommunities()
  loadPosts()
  setupInfiniteScroll()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
