<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content">
      <div class="feed-tabs">
        <button class="feed-tab active" data-feed="foryou" onclick="switchFeed('foryou')">Für dich</button>
        <button class="feed-tab" data-feed="latest" onclick="switchFeed('latest')">Neueste</button>
      </div>
      <div class="post-editor" id="postEditor">
        <textarea id="postContent" placeholder="Was gibt's Neues?" maxlength="280" rows="3"></textarea>
        <div class="editor-actions">
          <button class="btn btn-primary" onclick="submitPost()">Posten</button>
        </div>
      </div>
      <div id="feed"></div>
      <div id="sentinel" style="height:4px"></div>
    </main>
    <aside class="right-panel" id="rightPanel"></aside>
  </div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let feed = 'foryou'
let cursor = null
let hasMore = true
let loading = false
let observer = null

function switchFeed(tab) {
  feed = tab
  cursor = null
  hasMore = true
  document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'))
  document.querySelector(`.feed-tab[data-feed="${tab}"]`).classList.add('active')
  document.getElementById('feed').innerHTML = ''
  loadPosts()
}

async function loadPosts() {
  if (loading || !hasMore) return
  loading = true
  document.getElementById('feed').insertAdjacentHTML('beforeend', createSkeletonPost() + createSkeletonPost() + createSkeletonPost())

  try {
    const params = new URLSearchParams({ feed, limit: '20' })
    if (cursor) params.set('cursor', cursor)
    const data = await api(`/posts?${params}`)

    const feedEl = document.getElementById('feed')
    feedEl.innerHTML = ''

    if (data.data.length === 0) {
      feedEl.innerHTML = '<div class="empty-state"><p>' +
        (feed === 'foryou' ? 'Tritt Communities bei, um Beiträge zu sehen' : 'Noch keine Beiträge') +
        '</p></div>'
    } else {
      data.data.forEach(post => {
        feedEl.insertAdjacentHTML('beforeend', createPostCard(post))
      })
    }

    cursor = data.nextCursor
    hasMore = !!data.nextCursor
  } catch (err) {
    document.getElementById('feed').innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
  loading = false
}

function setupInfiniteScroll() {
  observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && hasMore && !loading) {
      loadPosts()
    }
  }, { threshold: 0.1 })

  const sentinel = document.getElementById('sentinel')
  if (sentinel) observer.observe(sentinel)
}

async function submitPost() {
  const content = document.getElementById('postContent').value.trim()
  if (!content) return

  try {
    const data = await api('/posts', {
      method: 'POST',
      body: JSON.stringify({ content, communityId: '' }),
    })
    document.getElementById('postContent').value = ''
    showToast('Beitrag erstellt!')
  } catch (err) {
    showToast(err.message, 'error')
  }
}

function render() {
  renderSidebar()
  renderRightPanel()
  loadPosts()
  setupInfiniteScroll()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
