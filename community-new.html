<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community erstellen - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Community erstellen</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="content-card" style="max-width:560px;margin:0 auto">
      <form id="communityForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="z.B. Programmierer" required oninput="autoGenerateSlug()">
        </div>
        <div class="form-group">
          <label for="slug">Slug</label>
          <input type="text" id="slug" placeholder="z.B. programmieren" required>
          <span class="text-muted text-sm">Wird in der URL angezeigt: /r/programmieren</span>
        </div>
        <div class="form-group">
          <label for="description">Beschreibung</label>
          <textarea id="description" rows="3" placeholder="Worum geht's in dieser Community?"></textarea>
        </div>
        <div class="form-group">
          <label>Privates Community</label>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <label class="toggle">
              <input type="checkbox" id="isPrivate">
              <span class="toggle-slider"></span>
            </label>
            <span class="text-sm text-muted">Nur auf Einladung beitretbar</span>
          </div>
        </div>
        <div class="form-error hidden" id="formError"></div>
        <button type="submit" class="btn btn-primary btn-full">Erstellen</button>
      </form>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
function autoGenerateSlug() {
  const name = document.getElementById('name').value
  if (!document.getElementById('slug').value || document.getElementById('slug').dataset.autogenerated !== 'false') {
    const slug = name.toLowerCase()
      .replace(/[ä]/g, 'ae').replace(/[ö]/g, 'oe').replace(/[ü]/g, 'ue')
      .replace(/[ß]/g, 'ss').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '')
    document.getElementById('slug').value = slug
    document.getElementById('slug').dataset.autogenerated = 'true'
  }
}

document.getElementById('slug').addEventListener('input', function() {
  this.dataset.autogenerated = 'false'
})

document.getElementById('communityForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const name = document.getElementById('name').value
  const slug = document.getElementById('slug').value
  const description = document.getElementById('description').value
  const isPrivate = document.getElementById('isPrivate').checked
  const errorEl = document.getElementById('formError')
  const btn = e.target.querySelector('button[type="submit"]')

  errorEl.classList.add('hidden')
  btn.disabled = true
  try {
    await api('/communities', { method: 'POST', body: JSON.stringify({ name, slug, description, isPrivate }) })
    showToast('Community erstellt', 'success')
    location.href = `/community.html?slug=${slug}`
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
  btn.disabled = false
})

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
