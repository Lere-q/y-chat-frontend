<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suche - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Suche</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="content-card">
      <div class="search-box" style="margin-bottom:16px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Suche nach Beiträgen, Communities..." onkeydown="if(event.key==='Enter')search()">
      </div>
      <div style="display:flex;border-bottom:2px solid #1e293b;margin-bottom:16px">
        <button class="tab-btn active" data-type="posts" onclick="switchSearchType('posts')">Beiträge</button>
        <button class="tab-btn" data-type="users" onclick="switchSearchType('users')">Benutzer</button>
        <button class="tab-btn" data-type="communities" onclick="switchSearchType('communities')">Communities</button>
      </div>
      <div id="searchResults">
        <div class="empty-state"><p>Gib einen Suchbegriff ein</p></div>
      </div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
let searchType = 'posts'

function switchSearchType(type) {
  searchType = type
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'))
  document.querySelector(`.tab-btn[data-type="${type}"]`).classList.add('active')
  search()
}

function search() {
  const query = document.getElementById('searchInput').value.trim()
  if (!query) { document.getElementById('searchResults').innerHTML = '<div class="empty-state"><p>Gib einen Suchbegriff ein</p></div>'; return }

  document.getElementById('searchResults').innerHTML = '<p class="text-muted text-sm" style="text-align:center;padding:20px">Suche...</p>'

  let endpoint = ''
  if (searchType === 'posts') endpoint = `/posts/search?q=${encodeURIComponent(query)}`
  else endpoint = `/search?q=${encodeURIComponent(query)}&type=${searchType}`

  api(endpoint).then(data => {
    const el = document.getElementById('searchResults')
    let items = data.data || []
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>Keine Ergebnisse</p></div>'
      return
    }

    if (searchType === 'posts') {
      el.innerHTML = items.map(p => createPostCard(p)).join('')
    } else if (searchType === 'communities') {
      el.innerHTML = items.map(c => `
        <a href="community.html?slug=${c.slug}" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;text-decoration:none;color:inherit;transition:background 0.15s">
          <span style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:16px;font-weight:700;flex-shrink:0">${c.name[0]}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;color:#fff">r/${escapeHtml(c.slug)}</div>
            <div style="font-size:12px;color:#64748b">${c._count?.members || 0} Mitglieder</div>
          </div>
        </a>
      `).join('')
    } else if (searchType === 'users') {
      el.innerHTML = items.map(u => `
        <a href="profile.html?id=${u.id}" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;text-decoration:none;color:inherit;transition:background 0.15s">
          ${getAvatarHtml(u, 'md')}
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;color:#fff">${escapeHtml(u.name)}</div>
            <div style="font-size:12px;color:#64748b;margin-top:2px">@${escapeHtml(u.username || '')}</div>
          </div>
        </a>
      `).join('')
    }
  }).catch(() => {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><p>Fehler bei der Suche</p></div>'
  })
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
