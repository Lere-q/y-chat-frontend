<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Trending</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="content-card">
      <h2 style="font-size:18px;font-weight:700;color:#fff;margin:0 0 16px;display:flex;align-items:center;gap:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Heute im Trend
      </h2>
      <div id="trendingList"></div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
async function loadTrending() {
  const el = document.getElementById('trendingList')
  try {
    const data = await api('/trending')
    const items = data.data || []
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>Keine Trending-Daten</p></div>'
      return
    }
    el.innerHTML = items.map((item, i) => `
      <a href="community.html?slug=${item.slug}" style="display:flex;align-items:center;gap:16px;padding:12px;border-radius:8px;text-decoration:none;color:inherit;transition:background 0.15s">
        <div style="width:24px;font-size:18px;font-weight:700;color:${i === 0 ? '#6366F1' : i < 3 ? '#94A3B8' : '#475569'};text-align:center">${i + 1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:500;color:#fff;font-size:14px">r/${item.slug}</div>
          <div style="display:flex;gap:16px;font-size:12px;color:#64748b;margin-top:2px">
            <span style="display:flex;align-items:center;gap:4px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${item.postCount} heute
            </span>
            <span style="display:flex;align-items:center;gap:4px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              ${item.memberCount}
            </span>
          </div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    `).join('')
  } catch {
    el.innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadTrending()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
