<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Messages</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content messages-layout">
    <div class="messages-layout">
      <div class="conversations-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
          <h2 style="font-size:18px;font-weight:700;color:#fff;margin:0">Nachrichten</h2>
          <button class="btn btn-primary btn-sm" onclick="showNewConversation()">+ Neu</button>
        </div>
        <div id="conversationList" style="overflow-y:auto;flex:1"></div>
      </div>
      <div class="chat-panel">
        <div id="chatHeader" class="chat-header">
          <p class="text-muted" style="margin:0">Wähle eine Konversation</p>
        </div>
        <div id="messageList" class="message-list"></div>
        <div id="messageInputArea" class="message-input-area hidden">
          <textarea id="messageInput" placeholder="Nachricht schreiben..." rows="1" oninput="autoResizeMsg(this)" onkeydown="handleMsgKey(event)"></textarea>
          <button class="btn btn-primary btn-sm" onclick="sendMessage()" id="sendBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>

<div id="newConversationModal" class="modal-overlay hidden">
  <div class="modal-content" style="max-width:400px;background:#1E293B;border:1px solid #334155;border-radius:12px;padding:24px">
    <h3 style="color:#fff;margin:0 0 16px;font-size:18px">Neue Konversation</h3>
    <div class="form-group">
      <label for="recipientUsername">Benutzername</label>
      <input type="text" id="recipientUsername" placeholder="benutzername">
    </div>
    <div class="form-error hidden" id="convError"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="startConversation()">Starten</button>
      <button class="btn btn-outline" onclick="closeNewConversation()">Abbrechen</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
let socket = null
let activeConversationId = null
let conversations = []
let user = null
let messageCursor = null, hasMoreMessages = true

try { user = JSON.parse(localStorage.getItem('user')) } catch {}

function connectSocket() {
  if (!user) return
  socket = io('http://168.119.139.61:40272', {
    auth: { token: localStorage.getItem('token') },
    transports: ['websocket', 'polling']
  })
  socket.on('connect', () => console.log('Socket connected'))
  socket.on('message', (msg) => {
    if (activeConversationId === msg.conversationId) {
      appendMessage(msg)
    }
    loadConversations()
  })
  socket.on('disconnect', () => console.log('Socket disconnected'))
}

async function loadConversations() {
  try {
    const data = await api('/conversations?limit=50')
    conversations = data.data || []
    const list = document.getElementById('conversationList')
    if (conversations.length === 0) {
      list.innerHTML = '<p class="text-muted text-sm" style="padding:16px;text-align:center">Keine Konversationen</p>'
      return
    }
    list.innerHTML = conversations.map(c => {
      const other = c.participants?.find(p => p.id !== user?.id) || c.participants?.[0]
      return `
        <div class="conversation-item ${c.id === activeConversationId ? 'active' : ''}" onclick="selectConversation('${c.id}')">
          ${getAvatarHtml(other, 'sm')}
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;color:#fff;font-weight:${c._count?.messages > 0 ? '600' : '400'}">${escapeHtml(other?.name || 'Unbekannt')}</div>
            <div style="font-size:12px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.lastMessage?.content || 'Keine Nachrichten'}</div>
          </div>
        </div>
      `
    }).join('')
  } catch {}
}

function selectConversation(id) {
  activeConversationId = id
  messageCursor = null
  hasMoreMessages = true
  document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'))
  document.querySelector(`.conversation-item[onclick*="'${id}'"]`)?.classList.add('active')
  loadMessages()
  showMessageInput()
}

async function loadMessages() {
  if (!activeConversationId) return
  const el = document.getElementById('messageList')
  el.innerHTML = '<p class="text-muted text-sm" style="text-align:center;padding:20px">Lädt...</p>'
  try {
    const params = new URLSearchParams({ limit: '50' })
    if (messageCursor) params.set('cursor', messageCursor)
    const data = await api(`/conversations/${activeConversationId}/messages?${params}`)
    messageCursor = data.nextCursor
    hasMoreMessages = !!data.nextCursor
    el.innerHTML = ''
    ;(data.data || []).forEach(m => appendMessage(m))
    el.scrollTop = el.scrollHeight
  } catch {
    el.innerHTML = '<p class="text-muted text-sm" style="text-align:center;padding:20px">Fehler beim Laden</p>'
  }
}

function appendMessage(msg) {
  const el = document.getElementById('messageList')
  if (!el) return
  const isOwn = msg.senderId === user?.id
  const div = document.createElement('div')
  div.className = `message ${isOwn ? 'own' : 'other'}`
  div.innerHTML = `
    <div class="message-avatar">${getAvatarHtml(msg.sender, 'sm')}</div>
    <div class="message-content">
      <div class="message-bubble">${escapeHtml(msg.content)}</div>
      <span class="message-time">${formatDate(msg.createdAt)}</span>
    </div>
  `
  el.appendChild(div)
  el.scrollTop = el.scrollHeight
}

function showMessageInput() {
  const area = document.getElementById('messageInputArea')
  area.classList.remove('hidden')
  document.getElementById('messageInput').focus()
}

function autoResizeMsg(el) {
  el.style.height = 'auto'
  el.style.height = el.scrollHeight + 'px'
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
}

async function sendMessage() {
  const input = document.getElementById('messageInput')
  const content = input.value.trim()
  if (!content || !activeConversationId) return
  input.value = ''
  input.style.height = 'auto'
  try {
    const data = await api(`/conversations/${activeConversationId}/messages`, {
      method: 'POST',
      body: JSON.stringify({ content })
    })
    appendMessage(data.data)
    loadConversations()
  } catch { showToast('Fehler beim Senden', 'error') }
}

function showNewConversation() {
  document.getElementById('newConversationModal').classList.remove('hidden')
  document.getElementById('recipientUsername').focus()
}

function closeNewConversation() {
  document.getElementById('newConversationModal').classList.add('hidden')
  document.getElementById('convError').classList.add('hidden')
  document.getElementById('recipientUsername').value = ''
}

async function startConversation() {
  const username = document.getElementById('recipientUsername').value.trim()
  if (!username) return
  const errorEl = document.getElementById('convError')
  errorEl.classList.add('hidden')
  try {
    const data = await api('/conversations', {
      method: 'POST',
      body: JSON.stringify({ username })
    })
    closeNewConversation()
    activeConversationId = data.data.id
    loadConversations()
    selectConversation(data.data.id)
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadConversations()
  connectSocket()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
