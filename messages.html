<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Messages</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content messages-layout">
    <div class="conversations-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;flex-shrink:0">
        <h1 style="display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:#fff;margin:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Messages
        </h1>
      </div>
      <div style="padding:8px 12px;border-bottom:1px solid #1e293b;flex-shrink:0">
        <div class="search-box" style="margin:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="userSearch" placeholder="Nach Usern suchen..." oninput="searchUsers()">
        </div>
        <div id="userSearchResults" class="hidden" style="margin-top:4px;max-height:200px;overflow-y:auto;background:#1e293b;border:1px solid #334155;border-radius:8px"></div>
      </div>
      <div id="conversationList" style="overflow-y:auto;flex:1"></div>
    </div>
    <div class="chat-panel" id="emptyChatState">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#64748b;gap:8px">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p class="text-sm">Wähle eine Konversation</p>
      </div>
    </div>
    <div class="chat-panel hidden" id="chatPanel">
      <div id="chatHeader" class="chat-header"></div>
      <div id="messageList" class="message-list"></div>
      <div id="messageInputArea" class="message-input-area">
        <textarea id="messageInput" placeholder="Nachricht schreiben..." rows="1" oninput="autoResizeMsg(this)" onkeydown="handleMsgKey(event)"></textarea>
        <button class="btn btn-primary btn-sm" onclick="sendMessage()" id="sendBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
let socket = null
let activeConversationId = null
let conversations = []
let user = null

try { user = getUser() } catch {}

function connectSocket() {
  if (!user || !getToken()) return
  socket = io('http://168.119.139.61:40272', {
    auth: { token: getToken() },
    transports: ['websocket', 'polling']
  })
  socket.on('connect', function() {
    console.log('Socket connected')
    if (activeConversationId) socket.emit('join:conversation', activeConversationId)
  })
  socket.on('dm:new', function(msg) {
    if (activeConversationId === msg.conversationId) {
      appendMessage(msg)
    }
    loadConversations()
  })
}

async function loadConversations() {
  try {
    const data = await api('/conversations?limit=50')
    conversations = data.data || []
    const list = document.getElementById('conversationList')
    if (conversations.length === 0) {
      list.innerHTML = '<p class="text-muted text-sm" style="padding:16px;text-align:center">Keine Konversationen</p>'
      return
    }
    list.innerHTML = conversations.map(function(c) {
      const other = c.participant
      const isActive = c.id === activeConversationId
      return '<div class="conversation-item ' + (isActive ? 'active' : '') + '" onclick="selectConversation(\'' + c.id + '\',\'' + escapeHtml((other && other.id) || '') + '\',\'' + escapeHtml((other && other.name) || 'Unbekannt') + '\',\'' + escapeHtml((other && other.image) || '') + '\')">' +
        '<div style="position:relative;flex-shrink:0">' +
        getAvatarHtml(other, 'md') +
        (c.unreadCount > 0 ? '<span class="unread-badge" style="position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:#6366f1;border-radius:50%;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center">' + c.unreadCount + '</span>' : '') +
        '</div>' +
        '<div style="flex:1;min-width:0;padding:0 4px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between">' +
        '<span style="font-size:14px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml((other && other.name) || 'Unbekannt') + '</span>' +
        (c.lastMessage ? '<span style="font-size:12px;color:#64748b;flex-shrink:0;margin-left:8px">' + formatDate(c.lastMessage.createdAt) + '</span>' : '') +
        '</div>' +
        '<div style="font-size:12px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">' + ((c.lastMessage && c.lastMessage.content) || 'Keine Nachrichten') + '</div>' +
        '</div></div>'
    }).join('')
  } catch {}
}

function selectConversation(id, pid, pname, pimg) {
  if (socket && activeConversationId && activeConversationId !== id) {
    socket.emit('leave:conversation', activeConversationId)
  }
  activeConversationId = id
  if (socket) socket.emit('join:conversation', id)
  document.querySelectorAll('.conversation-item').forEach(function(el) { el.classList.remove('active') })
  document.getElementById('emptyChatState').classList.add('hidden')
  document.getElementById('chatPanel').classList.remove('hidden')
  document.getElementById('chatHeader').innerHTML = '<div style="display:flex;align-items:center;gap:12px">' +
    getAvatarHtml({ name: pname, image: pimg }, 'md') +
    '<div><p style="font-size:14px;font-weight:500;color:#fff;margin:0">' + escapeHtml(pname) + '</p></div></div>'
  messageCursor = null
  hasMoreMessages = true
  loadMessages()
}

let messageCursor = null, hasMoreMessages = true, messageLoading = false

async function loadMessages() {
  if (!activeConversationId || messageLoading) return
  messageLoading = true
  const el = document.getElementById('messageList')
  if (!messageCursor) el.innerHTML = '<p class="text-muted text-sm" style="text-align:center;padding:20px">Lädt...</p>'
  try {
    const params = new URLSearchParams({ limit: '50' })
    if (messageCursor) params.set('cursor', messageCursor)
    const data = await api('/conversations/' + activeConversationId + '/messages?' + params.toString())
    messageCursor = data.nextCursor
    hasMoreMessages = !!data.nextCursor
    if (!messageCursor) el.innerHTML = ''
    ;(data.data || []).forEach(function(m) { appendMessage(m) })
    el.scrollTop = el.scrollHeight
  } catch {
    if (!messageCursor) el.innerHTML = '<p class="text-muted text-sm" style="text-align:center;padding:20px">Fehler beim Laden</p>'
  }
  messageLoading = false
}

function appendMessage(msg) {
  const el = document.getElementById('messageList')
  if (!el) return
  const isOwn = msg.sender && msg.sender.id === (user && user.id)
  if (isOwn === undefined) return
  const div = document.createElement('div')
  div.className = 'message ' + (isOwn ? 'own' : 'other')
  div.innerHTML = '<div class="message-content">' +
    '<div class="message-bubble">' + escapeHtml(msg.content) + '</div>' +
    '<span class="message-time">' + formatDate(msg.createdAt) + '</span></div>'
  el.appendChild(div)
  el.scrollTop = el.scrollHeight
}

function autoResizeMsg(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px' }

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
}

async function sendMessage() {
  const input = document.getElementById('messageInput')
  const content = input.value.trim()
  if (!content || !activeConversationId) return
  input.value = ''; input.style.height = 'auto'
  try {
    if (socket) {
      socket.emit('message:send', { conversationId: activeConversationId, content: content })
    } else {
      await api('/conversations/' + activeConversationId + '/messages', { method: 'POST', body: JSON.stringify({ content: content }) })
    }
    loadConversations()
  } catch { showToast('Fehler beim Senden', 'error') }
}

let searchTimeout = null

async function searchUsers() {
  const query = document.getElementById('userSearch').value.trim()
  const resultsEl = document.getElementById('userSearchResults')
  if (query.length < 1) { resultsEl.classList.add('hidden'); return }
  if (searchTimeout) clearTimeout(searchTimeout)
  searchTimeout = setTimeout(async function() {
    try {
      const data = await api('/users/search?q=' + encodeURIComponent(query) + '&limit=10')
      const users = data.data || []
      if (users.length === 0) {
        resultsEl.innerHTML = '<p class="text-sm text-muted" style="padding:8px 12px">Keine User gefunden</p>'
      } else {
        resultsEl.innerHTML = users.map(function(u) {
          return '<div class="conversation-item" onclick="startConversation(\'' + u.id + '\',\'' + escapeHtml(u.name) + '\',\'' + escapeHtml(u.image || '') + '\')" style="cursor:pointer">' +
            getAvatarHtml(u, 'md') +
            '<span style="font-size:14px;color:#fff;font-weight:500">' + escapeHtml(u.name) + '</span></div>'
        }).join('')
      }
      resultsEl.classList.remove('hidden')
    } catch {}
  }, 300)
}

async function startConversation(recipientId, name, image) {
  document.getElementById('userSearchResults').classList.add('hidden')
  document.getElementById('userSearch').value = ''
  try {
    const data = await api('/conversations', { method: 'POST', body: JSON.stringify({ recipientId: recipientId }) })
    activeConversationId = data.data.id
    loadConversations()
    selectConversation(data.data.id, recipientId, name, image)
  } catch (err) { showToast(err.message, 'error') }
}

function render() {
  if (!getUser()) { location.href='login.html'; return }
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadConversations()
  connectSocket()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
