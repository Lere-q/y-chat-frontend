<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><base href="/y-chat-frontend/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>r/ - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Suchen..." onclick="location.href='search.html'" readonly>
      </div>
    </div>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div id="communityHeader"></div>
    <div id="postEditorContainer"></div>
    <div id="feed"></div>
    <div id="sentinel" style="height:4px"></div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
const params = new URLSearchParams(location.search)
const slug = params.get('slug')
let cursor = null, hasMore = true, loading = false, community = null
let postImage = null

async function loadCommunity() {
  if (!slug) { location.href='communities.html'; return }
  try {
    const data = await api(`/communities/${slug}`)
    community = data.data
    document.title = `r/${escapeHtml(community.slug)} - Y-Chat`
    renderHeader()
    if (community.isMember) renderEditor()
    loadPosts()
  } catch { location.href='404.html' }
}

function renderHeader() {
  const el = document.getElementById('communityHeader')
  el.innerHTML = `
    <div class="community-cover">
      ${community.bannerImage ? `<img src="${community.bannerImage}" alt="">` : ''}
    </div>
    <div class="community-info-card" style="padding:16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div style="display:flex;align-items:center;gap:12px;min-width:0">
          <span class="community-icon-large" style="width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-size:24px;font-weight:700;flex-shrink:0">${community.name[0]}</span>
          <div style="min-width:0">
            <h1 style="font-size:20px;font-weight:700;color:#fff;margin:0">r/${escapeHtml(community.slug)}</h1>
            <p style="font-size:13px;color:#64748b;margin:2px 0 0">${escapeHtml(community.name)} · ${community._count?.members || 0} Mitglieder</p>
          </div>
        </div>
        <button class="btn ${community.isMember ? 'btn-outline' : 'btn-primary'} btn-sm" id="joinBtn" onclick="toggleJoin()">
          ${community.isMember ? 'Beigetreten' : 'Beitreten'}
        </button>
      </div>
      ${community.description ? `<p style="font-size:14px;color:#94a3b8;margin-top:12px;line-height:1.4">${escapeHtml(community.description)}</p>` : ''}
    </div>
  `
}

async function toggleJoin() {
  if (!community) return
  try {
    const isMember = community.isMember
    await api(`/communities/${slug}/join`, { method: isMember ? 'DELETE' : 'POST' })
    community.isMember = !isMember
    const btn = document.getElementById('joinBtn')
    btn.textContent = community.isMember ? 'Beigetreten' : 'Beitreten'
    btn.className = `btn ${community.isMember ? 'btn-outline' : 'btn-primary'} btn-sm`
    if (community.isMember) renderEditor()
    else {
      const editor = document.getElementById('postEditorContainer')
      if (editor) editor.innerHTML = ''
    }
  } catch {}
}

function renderEditor() {
  const container = document.getElementById('postEditorContainer')
  const user = getUser()
  container.innerHTML = `
    <div class="post-editor">
      <div class="post-editor-inner">
        <div id="editorAvatar">${user ? getAvatarHtml(user, 'md') : ''}</div>
        <div class="editor-body">
          <textarea id="postContent" placeholder="Beitrag in dieser Community..." rows="1" oninput="autoResize(this)"></textarea>
          <div id="imagePreview" class="image-preview hidden"></div>
          <div class="editor-actions">
            <div class="editor-tools">
              <label class="image-upload-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
              </label>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="char-count" id="charCount">280</span>
              <button class="btn btn-primary btn-sm" onclick="submitPost()" id="postBtn">Posten</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `
}

async function loadPosts() {
  if (loading || !hasMore) return
  loading = true
  const feedEl = document.getElementById('feed')
  for (let i = 0; i < 3; i++) {
    feedEl.insertAdjacentHTML('beforeend',
      '<div class="post-card"><div class="post-card-inner"><div class="post-avatar"><div class="skeleton" style="width:36px;height:36px;border-radius:50%"></div></div><div class="post-body"><div class="skeleton skeleton-text" style="width:120px"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:75%"></div></div></div></div>')
  }
  try {
    const params = new URLSearchParams({ community: slug, limit: '20' })
    if (cursor) params.set('cursor', cursor)
    const data = await api(`/posts?${params}`)
    feedEl.innerHTML = ''
    if (data.data.length === 0) {
      feedEl.innerHTML = '<div class="empty-state"><p>Noch keine Beiträge in dieser Community</p></div>'
    } else {
      data.data.forEach(p => feedEl.insertAdjacentHTML('beforeend', createPostCard(p)))
    }
    cursor = data.nextCursor
    hasMore = !!data.nextCursor
  } catch {
    feedEl.innerHTML = '<div class="empty-state"><p>Fehler beim Laden</p></div>'
  }
  loading = false
}

function handleImageUpload(input) {
  const file = input.files?.[0]
  if (!file) return
  if (file.size > 5 * 1024 * 1024) { showToast('Bild zu groß (max 5 MB)', 'error'); return }
  const reader = new FileReader()
  reader.onload = (e) => {
    postImage = e.target.result
    const preview = document.getElementById('imagePreview')
    preview.innerHTML = `<img src="${postImage}" alt=""><button onclick="removeImage()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
    preview.classList.remove('hidden')
  }
  reader.readAsDataURL(file)
}

function removeImage() { postImage = null; document.getElementById('imagePreview').classList.add('hidden') }

async function submitPost() {
  const content = document.getElementById('postContent').value.trim()
  if (!content) return
  if (content.length > 280) { showToast('Text zu lang', 'error'); return }
  const btn = document.getElementById('postBtn')
  btn.disabled = true
  try {
    const body = { content, communityId: community.id }
    if (postImage) {
      if (postImage.startsWith('data:')) {
        const blob = await fetch(postImage).then(r => r.blob())
        const fd = new FormData()
        fd.append('file', blob)
        const uploadRes = await api('/upload', { method: 'POST', body: fd })
        body.image = uploadRes.data.url
      } else { body.image = postImage }
    }
    await api('/posts', { method: 'POST', body: JSON.stringify(body) })
    document.getElementById('postContent').value = ''
    document.getElementById('charCount').textContent = '280'
    removeImage()
    showToast('Beitrag erstellt', 'success')
    cursor = null; hasMore = true; document.getElementById('feed').innerHTML = ''; loadPosts()
  } catch (err) { showToast(err.message, 'error') }
  btn.disabled = false
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = el.scrollHeight + 'px'
  const len = el.value.length
  const counter = document.getElementById('charCount')
  counter.textContent = 280 - len
  counter.className = 'char-count'
  if (len > 260) counter.classList.add('near-limit')
  if (len > 280) counter.classList.add('over-limit')
}

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  if (slug) loadCommunity()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
