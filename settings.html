<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstellungen - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Einstellungen</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="content-card" style="max-width:560px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
        <div style="position:relative;display:inline-block" class="group">
          <div id="settingsAvatar"></div>
          <label for="avatarUpload" style="position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;cursor:pointer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </label>
          <input type="file" id="avatarUpload" accept="image/*" class="hidden" onchange="uploadAvatar(this)">
        </div>
        <span style="font-size:18px;font-weight:600;color:#fff" id="settingsName"></span>
      </div>
      <form id="settingsForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" rows="3" placeholder="Kurze Beschreibung"></textarea>
        </div>
        <div class="form-error hidden" id="formError"></div>
        <button type="submit" class="btn btn-primary btn-full">Speichern</button>
      </form>
      <div style="margin-top:24px;padding-top:16px;border-top:1px solid #1e293b">
        <button class="btn btn-danger btn-full" onclick="logout()">Abmelden</button>
      </div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
function loadSettings() {
  const user = getUser()
  if (!user) { location.href = '/login.html'; return }

  const avatarEl = document.getElementById('settingsAvatar')
  avatarEl.innerHTML = getAvatarHtml(user, 'xl')
  document.getElementById('settingsName').textContent = user.name
  document.getElementById('name').value = user.name || ''
  document.getElementById('username').value = user.username || ''
  document.getElementById('bio').value = user.bio || ''
}

async function uploadAvatar(input) {
  const file = input.files?.[0]
  if (!file) return
  if (file.size > 5 * 1024 * 1024) { showToast('Bild zu groß (max 5 MB)', 'error'); return }
  try {
    const formData = new FormData()
    formData.append('file', file)
    const data = await api('/upload', { method: 'POST', body: formData })
    const imgUrl = data.data.url
    await api('/users/profile', { method: 'PUT', body: JSON.stringify({ image: imgUrl }) })
    const user = getUser()
    if (user) { user.image = imgUrl; localStorage.setItem('user', JSON.stringify(user)) }
    document.getElementById('settingsAvatar').innerHTML = `<img src="${imgUrl}" alt="" class="avatar avatar-xl">`
    showToast('Avatar aktualisiert', 'success')
  } catch { showToast('Upload fehlgeschlagen', 'error') }
}

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const name = document.getElementById('name').value
  const username = document.getElementById('username').value
  const bio = document.getElementById('bio').value
  const errorEl = document.getElementById('formError')
  const btn = e.target.querySelector('button[type="submit"]')

  errorEl.classList.add('hidden')
  btn.disabled = true
  try {
    const data = await api('/users/profile', { method: 'PUT', body: JSON.stringify({ name, username, bio }) })
    localStorage.setItem('user', JSON.stringify(data.data))
    document.getElementById('settingsName').textContent = data.data.name
    showToast('Einstellungen gespeichert', 'success')
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
  btn.disabled = false
})

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadSettings()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
