<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einstellungen - Y-Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <header class="top-bar">
    <button class="menu-btn" onclick="toggleMobileSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="page-title">Einstellungen</h1>
    <div id="topBarAvatar"></div>
  </header>
  <main class="main-content">
    <div class="content-card" style="max-width:560px;margin:0 auto">
      <div id="settingsAvatar" style="display:flex;align-items:center;gap:12px;margin-bottom:24px"></div>
      <form id="settingsForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" rows="3" placeholder="Kurze Beschreibung"></textarea>
        </div>
        <div class="form-error hidden" id="formError"></div>
        <button type="submit" class="btn btn-primary btn-full">Speichern</button>
      </form>
      <div style="margin-top:24px;padding-top:16px;border-top:1px solid #1E293B">
        <button class="btn btn-outline btn-full" onclick="logout()">Abmelden</button>
      </div>
    </div>
  </main>
  <aside class="right-panel" id="rightPanel"></aside>
</div>
<div id="mobileOverlay" class="modal-overlay hidden" onclick="toggleMobileSidebar()"></div>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
function loadSettings() {
  const user = getUser()
  if (!user) { location.href = '/login.html'; return }

  const avatarEl = document.getElementById('settingsAvatar')
  avatarEl.innerHTML = `${getAvatarHtml(user, 'lg')} <span style="font-size:18px;font-weight:600;color:#fff">${escapeHtml(user.name)}</span>`

  document.getElementById('name').value = user.name || ''
  document.getElementById('username').value = user.username || ''
  document.getElementById('bio').value = user.bio || ''
}

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const name = document.getElementById('name').value
  const username = document.getElementById('username').value
  const bio = document.getElementById('bio').value
  const errorEl = document.getElementById('formError')
  const btn = e.target.querySelector('button[type="submit"]')

  errorEl.classList.add('hidden')
  btn.disabled = true
  try {
    const data = await api('/users/profile', { method: 'PUT', body: JSON.stringify({ name, username, bio }) })
    localStorage.setItem('user', JSON.stringify(data.data))
    showToast('Einstellungen gespeichert', 'success')
  } catch (err) {
    errorEl.textContent = err.message
    errorEl.classList.remove('hidden')
  }
  btn.disabled = false
})

function render() {
  renderSidebar()
  renderTopBarAvatar()
  renderRightPanel()
  loadSettings()
}

document.addEventListener('DOMContentLoaded', render)
</script>
</body>
</html>
